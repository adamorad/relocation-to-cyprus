# =========================================================================
# Drop-in pre-commit config for new repos.
# Install:  cp ~/setup/pre-commit-config.template.yaml .pre-commit-config.yaml
#           pre-commit install
# =========================================================================
repos:
  # Secret scanning — blocks accidental token/key commits
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        # 2 MB cap: listing photos are heavy renders, listings.json is 1.9 MB.
        args: [--maxkb=2048]
      - id: check-case-conflict
      - id: check-yaml
      - id: check-json
      - id: detect-private-key

  # Python (uncomment if repo has Python)
  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.12.0
  #   hooks:
  #     - id: ruff-check
  #       args: [--fix]
  #     - id: ruff-format

  # JS/TS (uncomment if repo has JS/TS)
